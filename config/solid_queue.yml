default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      recurring_tasks:
        post_race_sync:
          class: PostRaceSyncJob
          schedule: every 30 minutes
  workers:
    - queues: "*"
      threads: 3
      polling_interval: 1

development:
  <<: *default

production:
  <<: *default

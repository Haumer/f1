<!DOCTYPE html>
<html>
<head>
  <title>Too Many Requests - F1 Elo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#e8e8ed;font-family:"DM Sans","Helvetica",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}.error-container{max-width:520px}.error-code{font-family:"IBM Plex Mono",monospace;font-size:120px;font-weight:700;line-height:1;background:linear-gradient(180deg,#e10600 0%,#6a0300 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}.error-title{font-size:22px;font-weight:700;margin-bottom:24px;color:#e8e8ed}.error-quote{font-size:18px;font-style:italic;color:#8a8a9a;line-height:1.5;margin-bottom:8px}.error-attribution{font-size:13px;color:#55556a;margin-bottom:32px}.error-divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,#e10600,transparent);margin:0 auto 32px;border-radius:1px}.error-home{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:transparent;color:#e8e8ed;border:1px solid rgba(255,255,255,0.12);border-radius:6px;text-decoration:none;font-size:14px;font-weight:600;transition:border-color 0.12s,color 0.12s}.error-home:hover{border-color:#e10600;color:#e10600}
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">429</div>
    <div class="error-title">Too Many Requests</div>
    <div class="error-divider"></div>
    <div class="error-quote">"Bono, my tyres are gone."</div>
    <div class="error-attribution">-- Lewis Hamilton, Turkey 2020</div>
    <a href="/" class="error-home">Back to Grid</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        width: 1200px;
        height: 630px;
        background: #0a0a0f;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }
    /* Subtle radial glow */
    .glow {
        position: absolute;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 400px;
        background: radial-gradient(ellipse, rgba(225, 6, 0, 0.08) 0%, transparent 70%);
        pointer-events: none;
    }
    /* Red accent line */
    .accent-line {
        width: 80px;
        height: 3px;
        background: linear-gradient(90deg, transparent, #e10600, transparent);
        border-radius: 2px;
        margin-bottom: 32px;
        box-shadow: 0 0 20px rgba(225, 6, 0, 0.4);
    }
    .title {
        font-size: 72px;
        font-weight: 800;
        color: #e8e8ed;
        letter-spacing: -2px;
        margin-bottom: 12px;
    }
    .title span {
        color: #e10600;
    }
    .subtitle {
        font-size: 22px;
        color: #8a8a9a;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 48px;
    }
    .stats {
        display: flex;
        gap: 64px;
    }
    .stat {
        text-align: center;
    }
    .stat-value {
        font-size: 48px;
        font-weight: 700;
        color: #e8e8ed;
        line-height: 1;
        margin-bottom: 8px;
    }
    .stat-label {
        font-size: 13px;
        font-weight: 600;
        color: #55556a;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .bottom-line {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent 10%, #e10600 50%, transparent 90%);
    }
    .url {
        position: absolute;
        bottom: 24px;
        font-size: 16px;
        color: #55556a;
        letter-spacing: 1px;
    }
</style>
</head>
<body>
    <div class="glow"></div>
    <div class="accent-line"></div>
    <div class="title">F1 <span>Elo</span></div>
    <div class="subtitle">Rating Every Driver Since 1950</div>
    <div class="stats">
        <div class="stat">
            <div class="stat-value">870+</div>
            <div class="stat-label">Drivers</div>
        </div>
        <div class="stat">
            <div class="stat-value">1,100+</div>
            <div class="stat-label">Races</div>
        </div>
        <div class="stat">
            <div class="stat-value">75</div>
            <div class="stat-label">Seasons</div>
        </div>
        <div class="stat">
            <div class="stat-value">2,500+</div>
            <div class="stat-label">Elo Ratings</div>
        </div>
    </div>
    <div class="bottom-line"></div>
    <div class="url">f1elo.com</div>
</body>
</html>

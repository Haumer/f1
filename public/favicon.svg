<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e10600"/>
      <stop offset="100%" stop-color="#b80500"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- F1 car silhouette (simplified side view) -->
  <g transform="translate(4, 18)">
    <!-- Main body -->
    <path d="M8,22 L12,16 L22,14 L30,10 L42,10 L50,14 L54,16 L54,22 Z" fill="url(#g)"/>
    <!-- Cockpit -->
    <path d="M28,10 L32,6 L38,6 L42,10 Z" fill="#1a1a24"/>
    <!-- Front wing -->
    <path d="M2,22 L8,22 L10,18 L4,20 Z" fill="url(#g)"/>
    <!-- Rear wing -->
    <path d="M50,8 L56,8 L56,10 L50,14 Z" fill="url(#g)"/>
    <rect x="52" y="6" width="2" height="6" rx="1" fill="#e10600"/>
    <!-- Wheels -->
    <circle cx="16" cy="24" r="5" fill="#222"/>
    <circle cx="16" cy="24" r="3" fill="#444"/>
    <circle cx="46" cy="24" r="5" fill="#222"/>
    <circle cx="46" cy="24" r="3" fill="#444"/>
    <!-- Halo -->
    <path d="M30,10 Q35,4 40,10" fill="none" stroke="#666" stroke-width="1.5"/>
  </g>
</svg>
